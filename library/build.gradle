plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
    id 'maven-publish'
}

if (project.hasProperty('signing.keyId')) {
    apply plugin: 'signing'
}

version = findProperty('LIBRARY_VERSION') ?: '2.1.0'
group = 'com.sfyc.ctpv'

android {
    namespace 'com.sfyc.ctpv'
    compileSdk rootProject.ext.compile_sdk_version

    defaultConfig {
        minSdk rootProject.ext.min_sdk_version
        targetSdk rootProject.ext.target_sdk_version
        versionCode 5
        versionName project.version.toString()

        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    lint {
        abortOnError false
    }

    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

dependencies {
    implementation 'androidx.annotation:annotation:1.7.1'
    implementation 'androidx.lifecycle:lifecycle-common:2.7.0'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = project.group
                artifactId = 'counttimeprogressview'
                version = project.version
                pom {
                    name = 'Android CountTime ProgressView'
                    description = 'An Android library that provides a count time circular progress view effect.'
                    url = 'https://github.com/sfyc23/CountTimeProgressView'
                    inceptionYear = '2016'
                    licenses {
                        license {
                            name = 'The Apache Software License, Version 2.0'
                            url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                            distribution = 'repo'
                        }
                    }
                    developers {
                        developer {
                            id = 'sfyc23'
                            name = 'sfyc23'
                            email = 'sfyc23@gmail.com'
                        }
                    }
                    scm {
                        connection = 'scm:git:git://github.com/sfyc23/CountTimeProgressView.git'
                        developerConnection = 'scm:git:ssh://github.com/sfyc23/CountTimeProgressView.git'
                        url = 'https://github.com/sfyc23/CountTimeProgressView'
                    }
                    issueManagement {
                        system = 'GitHub Issues'
                        url = 'https://github.com/sfyc23/CountTimeProgressView/issues'
                    }
                }
            }
        }

        repositories {
            if (project.hasProperty('ossrhUsername') && project.hasProperty('ossrhPassword')) {
                maven {
                    name = 'OSSRH'
                    def releasesRepoUrl = 'https://s01.oss.sonatype.org/service/local/staging/deploy/maven2/'
                    def snapshotsRepoUrl = 'https://s01.oss.sonatype.org/content/repositories/snapshots/'
                    url = version.toString().endsWith('SNAPSHOT') ? snapshotsRepoUrl : releasesRepoUrl
                    credentials {
                        username = project.property('ossrhUsername')
                        password = project.property('ossrhPassword')
                    }
                }
            }

            maven {
                name = 'Local'
                url = "${rootProject.buildDir}/local-repo"
            }
        }
    }

    if (project.hasProperty('signing.keyId')) {
        signing {
            sign publishing.publications.release
        }
    }
}
